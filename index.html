    <style>
        .container {
            box-shadow: 2px 2px 2px 2px var(--sky-blue01b);
        }

        .logo {
            position: relative;
            height: 40vh;
            margin-top: 20px;
        }

        .logo .box {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: var(--sky-blue02);
            transform: rotate(45deg);
            border-radius: 10px;
        }

        .logo .box1 {
            right: 0;
            box-shadow: 1px -3px 4px 4px var(--sky-blue01);
        }

        .logo .box2 {
            bottom: 0;
            box-shadow: 1px 3px 4px 4px var(--sky-blue01);
        }

        .logo .box3 {
            position: absolute;
            background-color: var(--sky-blue01b);
            right: 20px;
            left: 20px;
            bottom: 10px;
            top: 10px;
            border-radius: 10px;
        }

        .logo .box4 {
            position: absolute;
            background-color: var(--sky-blue03);
            background-image: url(img/SamiLogo.jpg);
            background-position: 35% center;
            background-size: cover;
            width: 30vh;
            height: 30vh;
            border-radius: 15vh;
            left: 15%;
            top: 5vh;
            box-shadow: 1px 2px 4px 6px var(--sky-blue01);
        }

        .text-info {
            position: absolute;
            top: 10vh;
            left: 45%;
            right: 20%;
        }

        .text-info h1 {
            font-size: 40px;
            font-family: "Chiron GoRound TC", sans-serif;
            font-weight: 900;
            color: var(--sky-blue03);
        }

        .text-info hr {
            border-color: var(--sky-blue10);
            border-width: 5px;
        }

        .text-info h3 {
            font-size: 25px;
            color: var(--sky-blue03);
        }

        .text-info p {
            font-size: 20px;
            padding-left: 25px;
            color: var(--sky-blue03);
            margin-bottom: 0;
        }

        .text-info a {
            font-size: 25px;
            font-weight: 900;
            padding-left: 30px;
        }

        .works {
            text-align: center;
        }

        .works a {
            background: var(--sky-grad-A);
            color: var(--sky-ui-text-C);
            text-decoration: none;
            padding: 20px;
            font-size: 20px;
            border-radius: 40px;
            box-shadow: 1px 2px 4px 2px var(--sky-blue01);
            transition: transform 0.5s;
        }

        .works a:hover {
            background: var(--sky-grad-C);
            color: var(--sky-blue09);
            transform: scale(1.05);
        }

        .footer p {
            padding: 5px;
        }

        @media screen and (max-width: 990px) {
            .logo .box4 {
                top: 10%;
                left: 50%;
                transform: translateX(-50%);
            }

            .text-info {
                position: static;
                margin: 20px auto;
                text-align: center;
            }

            .text-info h1 {
                color: var(--sky-blue01);
            }

            .text-info hr {
                border-color: var(--sky-blue01);
            }

            .text-info h3 {
                color: var(--sky-blue01b);
            }

            .text-info p {
                padding-left: 0;
                color: var(--sky-blue02);
                margin-bottom: 0;
            }

            .text-info a {
                background-color: var(--sky-blue03);
                line-height: 4rem;
                padding: 5px 10px;
                border-radius: 30px;
                box-shadow: 1px 2px 4px 2px var(--sky-blue01);
            }

            .media-title {
                font-size: 35px;
            }

            .list-inline {
                display: block;
            }

            .list-inline-item {
                display: block;
            }

            .works a {
                padding: 10px;
                font-size: 25px;
                border-radius: 0;
                margin-top: 5px;
                box-shadow: none;
                border-top-right-radius: 30px;
                border-bottom-right-radius: 30px;
            }

            .works a:hover {
                transform: none;
            }

            .footer p {
                font-size: 12px;
            }
        }
    </style>
</head>

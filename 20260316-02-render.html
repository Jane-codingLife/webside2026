    <style>
        .img-box {
            width: 250px;
            height: 200px;
            object-fit: cover;
            /* 🌟 核心靈魂：保持比例填滿，超出自動隱藏，絕不變形 */
            object-position: center;
            /* (選填) 確保裁切時以圖片正中央為主 */
        }

        .img-box img {
            width: 100%;
            height: auto;
        }

        @media screen and (max-width: 990px) {
            .table-rwd thead {
                display: none;
            }

            .table-rwd tbody tr {
                display: block;
                margin-top: 20px;
                border-radius: 10px;
                border: 3px solid var(--sky-pink05);
                box-shadow: 2px 2px 2px 2px var(--sky-ui-bg-A);
            }

            .table-rwd tbody tr td {
                display: block;
                font-size: 20px;
                overflow: hidden;
            }

            .table-rwd tbody tr td::before {
                content: attr(data-th) " : ";
                font-size: 20px;
                font-weight: 900;
                color: var(--sky-pink05);
                display: block;
                float: left;
                width: 25%;
                text-align: right;
                padding-right: 5px;
            }

            .table-rwd tbody tr td span {
                display: block;
                float: left;
                width: 75%;
            }
            
            .img-box {
                width: 50px;
                height: 200px;
            }

            .img-box img {
                border-radius: 50%;
                width: 155px;
                height: auto;
            }
        }
    </style>

</head>

<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch17 Vue.js</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/myCssTools.css">
    <style>
        .box01 {
            height: 190px;
            width: 180px;
            transform: translateX(100px);
            margin-top: 20px;
            margin-bottom: 20px;
            transition: transform 0.5s;
        }

        .rotate01 {
            transform: rotate(45deg) translateX(100px);
        }

        .rotate02 {
            transform: rotate(80deg) translateX(100px);
        }

        .rotate03 {
            transform: rotate(135deg) translateX(100px);
        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <div class="row justify-content-center">
            <div class="py-2 mt-4 col-md-10 text-center display-3 bg-warning rounded-5 fw-bolder">
                {{tit1}}
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="mt-3 col-md-4 bg-danger text-white text-center">
                {{msg}}
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-6 col-md-2 text-center">
                <button class="mt-3 btn btn-primary">{{btn1_text}}</button>
            </div>
            <div class="col-6 col-md-2 text-center">
                <button class="mt-3 btn btn-secondary">{{btn2_text}}</button>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="py-2 mt-4 col-md-10 text-center display-3 bg-warning rounded-5 fw-bolder">
                {{tit2}}
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="mt-2 display-6 p-2 text-bg-success">【資料綁定】v-model</div>
                <div class="mt-3">
                    <label for="" class="form-label col-form-label-lg">產品名稱</label>
                    <input type="text" class="form-control form-control-lg" v-model="pname">
                </div>
                <span>你輸入的資料: {{pname}}</span>

                <div class="mt-3">
                    <label for="" class="form-label col-form-label-lg">數量</label>
                    <input type="number" class="form-control form-control-lg" v-model="pnum" min="1" max="10">
                </div>
                <span>你輸入的數量: {{pnum}}</span>
            </div>
            <hr class="mt-3">
            <div class="col-12">
                <div class="display-6 p-2 text-bg-success">【綁定:屬性】v-bind:src</div>
                <div class="mt-3">
                    <img v-bind:src="imgSrc1" alt="" v-bind:class="bClass">
                    <img v-bind:src="imgSrc2" alt="" v-bind:class="bClass">
                    <img v-bind:src="imgSrc3" alt="" v-bind:class="bClass">
                    <img v-bind:src="imgSrc4" alt="" v-bind:class="bClass">
                </div>
            </div>

            <!-- 可以額外再加一次 class 只能加一次。 -->
            <div class="col-6">
                <div class="box01 border border-3"
                    v-bind:class="{'rotate01':isRotate01, 'rotate02':isRotate02, 'rotate03':isRotate03}"></div>
            </div>
            <div class="col-6 align-content-center text-center">
                <div class="row flex-cloumn px-5">
                    <button class="btn btn-primary mt-2"
                        v-on:click="isRotate02 = false, isRotate03 = false, isRotate01 = !isRotate01">傾斜45度</button>
                    <button class="btn btn-success mt-2"
                        v-on:click="isRotate01 = false, isRotate03 = false, isRotate02 = !isRotate02">傾斜80度</button>
                    <button class="btn btn-warning mt-2"
                        v-on:click="isRotate01 = false, isRotate02 = false, isRotate03 = !isRotate03">傾斜135度</button>
                </div>
            </div>


            <hr class="mt-3">
            <div class="col-12">
                <div class="display-6 p-2 text-bg-success">【監聽:事件】v-on:click</div>
                <div class="mt-3 text-center">
                    <button class="btn btn-primary w-25 m-1" v-on:click="count++">加成</button>
                    <button class="btn btn-danger w-25 m-1" v-on:click="count--">扣除</button>
                    <span class="mx-5 fw-bolder">計數: {{count}}</span>
                </div>
            </div>

            <hr class="mt-3">
            <div class="col-12">
                <div class="display-6 p-2 text-bg-success">【練習】反轉字串</div>
                <div class="mt-3 text-center">
                    <input type="text" class="form-control form-control-lg" v-model="reTxt" v-on:change="reverseTxt()">
                    <label for="" class="form-label col-form-label-lg">{{reNewTxt}}</label>
                </div>
            </div>

            <hr class="mt-3">
            <div class="col-12">
                <div class="display-6 p-2 text-bg-success">【For 迴圈】v-for</div>
                <div class="mt-3">
                    <ul class="list-group">
                        <!-- v-for + v-if 需要包一層外 template 放 for 裡面再用 if 判斷 -->
                        <template v-for="(val, key) in pdList">
                            <li class="list-group-item" v-if="val.price > 50">
                                {{ key +1 }}: {{ val.product }} ${{ val.price }}-
                            </li>
                        </template>
                    </ul>
                </div>
            </div>

            <hr class="mt-3">
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- <script src="js/jquery-4.0.0.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- ↓↓↓ 讀取 JSON Server 的 axios ↓↓↓ -->
    <!-- <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script> -->
    <!-- ↓↓↓ 載入 Vue 框架 ↓↓↓ -->
    <script src="js/vue.global.js"></script>
    <script>
        Vue.createApp({
            // 存放資料ㄉ
            data() {
                return {
                    // 數據渲染到 Html 上，資料推動畫面
                    tit1: "1.基本指令架構",
                    msg: "Nice to meet you.",
                    btn1_text: "這是確定按鈕...",
                    btn2_text: "這是取消按鈕...",
                    tit2: "2.綁定資料",
                    pname: "紅茶拿鐵",
                    pnum: 1,
                    imgSrc1: "img/Animals_003.avif",
                    imgSrc2: "img/Animals_009.avif",
                    imgSrc3: "img/Animals_010.avif",
                    imgSrc4: "img/Party_003.avif",
                    count: 1,
                    bClass: "img-fluid img-thumbnail mt-2 w-50",
                    isRotate01: false,
                    isRotate02: false,
                    isRotate03: false,
                    reTxt: "輸入字串",
                    reNewTxt: "",
                    pdList: [
                        {
                            product: '草莓',
                            price: 100
                        },
                        {
                            product: '蘋果',
                            price: 50
                        },
                        {
                            product: '香蕉',
                            price: 70
                        },
                    ]
                }
            },
            // 以下還可以放很多 func() => 放在 methods
            methods: {
                reverseTxt() {
                    // split -> 裁切, reverse -> 反轉, join -> 合併
                    this.reNewTxt = this.reTxt.split('').reverse().join('')
                }
            }
        }).mount("#app")
    </script>
</body>

</html>
